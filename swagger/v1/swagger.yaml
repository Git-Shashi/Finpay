  "/api/v1/expenses/{id}/approve":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Approve an expense
      tags:
      - Expense Workflow
      security:
      - token_auth: []
        client_auth: []
        uid_auth: []
      description: Admin only. Transitions expense from pending → approved.
      responses:
        '200':
          description: expense approved
        '403':
          description: forbidden - admin only
        '422':
          description: invalid state transition
  "/api/v1/expenses/{id}/reject":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Reject an expense
      tags:
      - Expense Workflow
      security:
      - token_auth: []
        client_auth: []
        uid_auth: []
      description: Admin only. Transitions expense from pending → rejected.
      parameters: []
      responses:
        '200':
          description: expense rejected
        '403':
          description: forbidden - admin only
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: Missing receipt
  "/api/v1/expenses/{id}/reimburse":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Reimburse an expense
      tags:
      - Expense Workflow
      security:
      - token_auth: []
        client_auth: []
        uid_auth: []
      description: Admin only. Transitions expense from approved → reimbursed.
      responses:
        '200':
          description: expense reimbursed
        '403':
          description: forbidden - admin only
  "/api/v1/expenses/{id}/archive":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Archive an expense
      tags:
      - Expense Workflow
      security:
      - token_auth: []
        client_auth: []
        uid_auth: []
      description: Admin only. Archives a reimbursed expense.
      responses:
        '200':
          description: expense archived
        '403':
          description: forbidden - admin only
  "/api/v1/expenses/{id}/receipts":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: List receipts for an expense
      tags:
      - Receipts
      security:
      - token_auth: []
        client_auth: []
        uid_auth: []
      responses:
        '200':
          description: receipts listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        amount:
                          type: number
                        receipt_date:
                          type: string
                          format: date
                        notes:
                          type: string
                          nullable: true
                        status:
                          type: string
                        processed_at:
                          type: string
                          format: date-time
                          nullable: true
                        file_url:
                          type: string
                          nullable: true
    post:
      summary: Upload a receipt for an expense
      tags:
      - Receipts
      security:
      - token_auth: []
        client_auth: []
        uid_auth: []
      parameters: []
      responses:
        '201':
          description: receipt uploaded
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                receipt[file]:
                  type: string
                  format: binary
                  description: Receipt file (image or PDF)
                receipt[amount]:
                  type: number
                  example: 150.0
                receipt[receipt_date]:
                  type: string
                  format: date
                  example: '2026-03-17'
                receipt[notes]:
                  type: string
                  example: Hotel receipt
              required:
              - receipt[file]
              - receipt[amount]
              - receipt[receipt_date]
  "/api/v1/expenses/{id}/receipts/{receipt_id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    - name: receipt_id
      in: path
      required: true
      schema:
        type: integer
    delete:
      summary: Delete a receipt
      tags:
      - Receipts
      security:
      - token_auth: []
        client_auth: []
        uid_auth: []
      responses:
        '204':
          description: receipt deleted
        '404':
          description: receipt not found
