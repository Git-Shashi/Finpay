  "/api/v1/expenses":
    get:
      summary: List expenses
      tags:
      - Expenses
      security:
      - token_auth: []
        client_auth: []
        uid_auth: []
      parameters:
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        description: 'Items per page (default: 10)'
        schema:
          type: integer
      - name: category_id
        in: query
        required: false
        description: Filter by category
        schema:
          type: integer
      - name: status
        in: query
        required: false
        description: "Filter by status:\n * `pending` \n * `approved` \n * `rejected`
          \n * `reimbursed` \n * `archived` \n "
        enum:
        - pending
        - approved
        - rejected
        - reimbursed
        - archived
        schema:
          type: string
      - name: start_date
        in: query
        required: false
        description: Filter start date (YYYY-MM-DD)
        schema:
          type: string
      - name: end_date
        in: query
        required: false
        description: Filter end date (YYYY-MM-DD)
        schema:
          type: string
      responses:
        '200':
          description: expenses listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  expenses:
                    type: array
                    items:
                      type: object
                  pagination:
                    type: object
                    properties:
                      current_page:
                        type: integer
                      next_page:
                        type: integer
                        nullable: true
                      prev_page:
                        type: integer
                        nullable: true
                      total_pages:
                        type: integer
                      total_count:
                        type: integer
        '401':
          description: unauthorized
    post:
      summary: Create an expense
      tags:
      - Expenses
      security:
      - token_auth: []
        client_auth: []
        uid_auth: []
      parameters: []
      responses:
        '201':
          description: expense created
        '422':
          description: invalid request
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                expense:
                  type: object
                  properties:
                    amount:
                      type: number
                      example: 150.0
                    description:
                      type: string
                      example: Flight to client meeting
                    expense_date:
                      type: string
                      format: date
                      example: '2026-03-17'
                    category_id:
                      type: integer
                      example: 1
                  required:
                  - amount
                  - description
                  - expense_date
                  - category_id
  "/api/v1/expenses/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
