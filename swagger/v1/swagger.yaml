---
openapi: 3.0.1
info:
  title: Finpay API
  version: v1
  description: API documentation for Finpay expense management system
servers:
- url: http://localhost:3000
  description: Development
components:
  securitySchemes:
    token_auth:
      type: apiKey
      in: header
      name: access-token
      description: devise_token_auth access token
    client_auth:
      type: apiKey
      in: header
      name: client
    uid_auth:
      type: apiKey
      in: header
      name: uid
security:
- token_auth: []
  client_auth: []
  uid_auth: []
paths:
  "/api/v1/categories":
    get:
      summary: List all categories
      tags:
      - Categories
      security:
      - token_auth: []
        client_auth: []
        uid_auth: []
      responses:
        '200':
          description: categories listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                      required:
                      - id
                      - name
    post:
      summary: Create a category
      tags:
      - Categories
      security:
      - token_auth: []
        client_auth: []
        uid_auth: []
      parameters: []
      responses:
        '201':
          description: category created
        '422':
          description: invalid request
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                category:
                  type: object
                  properties:
                    name:
                      type: string
                      example: Travel
                  required:
                  - name
  "/api/v1/categories/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Get a category
      tags:
      - Categories
      security:
      - token_auth: []
        client_auth: []
        uid_auth: []
      responses:
        '200':
          description: category found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
                    required:
                    - id
                    - name
        '404':
          description: category not found
    patch:
      summary: Update a category
      tags:
      - Categories
      security:
      - token_auth: []
        client_auth: []
        uid_auth: []
      parameters: []
      responses:
        '200':
          description: category updated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                category:
                  type: object
                  properties:
                    name:
                      type: string
                      example: Updated Name
                  required:
                  - name
    delete:
      summary: Delete a category
      tags:
      - Categories
      security:
      - token_auth: []
        client_auth: []
        uid_auth: []
      responses:
        '204':
          description: category deleted
